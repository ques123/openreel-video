<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Drop your footage. Get your film. An AI video editor that understands your clips entirely on your own machine — nothing uploads.">
<title>wizz.video</title>
<style>
  /* Tokens lifted verbatim from apps/web/src/styles/wizz-tokens.css (frozen
     source of truth) — inlined here since this page is fully self-contained
     per contracts §0 ("static file... tokens inlined, no external CSS/JS
     except ONE SimpleAnalytics tag"). Both themes via prefers-color-scheme
     only — no JS theme toggle on this page. */
  :root{
    --ground:#f1f0ea; --panel:#ffffff; --line:#dcd9d0;
    --ink:#232630; --dim:#6b7080; --accent:#b3762a; --on-accent:#ffffff;
    --font-body:"Avenir Next",-apple-system,"Segoe UI",system-ui,sans-serif;
    --font-display:"Futura","Avenir Next",ui-sans-serif,sans-serif;
  }
  @media (prefers-color-scheme: dark){ :root{
    --ground:#14171d; --panel:#1b1f28; --line:#2a2f3a;
    --ink:#eae7e0; --dim:#8f95a3; --accent:#e0a458; --on-accent:#1a1206;
  }}

  *{box-sizing:border-box}
  html,body{margin:0; padding:0;}
  body{
    background:var(--ground); color:var(--ink); font-family:var(--font-body);
    font-size:15px; line-height:1.55;
  }
  h1{margin:0; text-wrap:balance;}
  p{margin:0;}
  a{font:inherit; color:inherit; cursor:pointer; text-decoration:none;}
  :focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:4px;}
  @media (prefers-reduced-motion: reduce){ *{transition:none!important; animation:none!important} }

  .btn{
    display:inline-block; border:1px solid var(--line); background:var(--panel);
    border-radius:8px; padding:9px 16px; font-weight:600; font-size:14px;
    transition:border-color .15s, background .15s;
  }
  .btn:hover{border-color:var(--dim)}
  .btn-primary{background:var(--accent); color:var(--on-accent); border-color:transparent;}
  .btn-primary:hover{filter:brightness(1.06)}

  .display{font-family:var(--font-display);}
  .brand{font-family:var(--font-display); font-weight:700; letter-spacing:.06em;}
  .landing-brand{font-size:15px; color:var(--dim); letter-spacing:.22em; text-transform:uppercase;}

  .centered{
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    justify-content:center; padding:32px; text-align:center;
  }
  .thesis{
    font-size:clamp(34px,6vw,58px); font-weight:600; letter-spacing:-.01em;
    margin:18px 0 14px; max-width:16ch;
  }
  .privacy-line{color:var(--dim); max-width:44ch; margin-bottom:36px; font-size:16px;}
  .actions{display:flex; gap:12px; flex-wrap:wrap; justify-content:center;}
</style>
</head>
<body>
<section class="centered">
  <div class="landing-brand brand">wizz.video</div>
  <h1 class="thesis display">Drop your footage.<br>Get your film.</h1>
  <p class="privacy-line">Your clips are watched, listened to, and understood entirely on your own machine. Nothing uploads.</p>
  <div class="actions">
    <a class="btn btn-primary" href="/app/auth">I have an invite</a>
    <a class="btn" href="/app/auth?mode=login">Sign in</a>
  </div>
</section>
<script async src="https://scripts.simpleanalyticscdn.com/latest.js"></script>
</body>
</html>
